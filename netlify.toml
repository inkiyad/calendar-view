[build]
  publish = "client/build"
  command = "cd client && npm install && npm run build"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ORG_NAME,ORG_DESCRIPTION,ORG_ADDRESS,EVENT_TAGS,INSTAGRAM_HANDLE,REVIEW_ID,WHATSAPP_GRAPH_API_VERSION"

[dev]
  command    = "npm start --prefix client"
  port       = 8888
  targetPort = 3000
  publish    = "client/build"
  framework  = "#custom"

[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["prompts/whatsapp-event-extraction.txt"]

[functions."cron-poller"]
  schedule = "0 * * * *"

[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
